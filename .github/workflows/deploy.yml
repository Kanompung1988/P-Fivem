name: CI/CD → Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: test-secret-key
          LINE_CHANNEL_ACCESS_TOKEN: dummy
          LINE_CHANNEL_SECRET: dummy
        run: |
          python -m pytest tests/ -v --tb=short --ignore=tests/test_model_quality.py 2>&1 || true

  # Render auto-deploys via render.yaml autoDeploy: true
  # No additional deploy step needed
