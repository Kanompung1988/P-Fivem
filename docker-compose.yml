# Docker Compose for Seoulholic Multi-Platform System
# Phase 1: RAG + Cache + PostgreSQL + Multi-Platform
# Run: docker compose up --build

version: '3.8'

services:
  # PostgreSQL Database (NEW)
  postgres:
    image: postgres:16-alpine
    container_name: seoulholic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: seoulholic
      POSTGRES_PASSWORD: seoulholic_password_change_this
      POSTGRES_DB: seoulholic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seoulholic"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis Cache (Existing)
  redis:
    image: redis:7-alpine
    container_name: seoulholic-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Main Chatbot Service (Updated)
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seoulholic-chatbot
    restart: unless-stopped
    ports:
      - "9000:9000"  # Main app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://seoulholic:seoulholic_password_change_this@postgres:5432/seoulholic_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn main_app:app --host 0.0.0.0 --port 9000 --reload

  # Facebook Auto-Scraper (Optional)
  fb-scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seoulholic-fb-scraper
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://seoulholic:seoulholic_password_change_this@postgres:5432/seoulholic_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db
    command: python facebook_integration/auto_updater.py
    depends_on:
      - postgres
      - redis
      - chatbot
    profiles:
      - full  # Run only with: docker compose --profile full up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

networks:
  default:
    name: seoulholic-network
